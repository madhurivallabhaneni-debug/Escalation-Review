        ],
        "wins": [],
        "teamStrengths": []
      }
    }
  ]
}
</script>

<style>

<body>

<div class="header" id="hdr"></div>

<div class="tabs">
  <div class="tab active" onclick="showTab('overview',this)">Overview</div>
  <div class="tab"        onclick="showTab('cases',this)">Case Details</div>
  <div class="tab"        onclick="showTab('themes',this)">Themes &amp; Insights</div>
  <div class="tab"        onclick="showTab('actions',this)">Action Items</div>
</div>

<div class="content">
  <div class="section active" id="section-overview"></div>
  <div class="section"        id="section-cases"></div>
  <div class="section"        id="section-themes"></div>
  <div class="section"        id="section-actions"></div>
</div>

<div class="footer" id="ftr"></div>

<script>
const ALL_TEAMS = JSON.parse(document.getElementById('all-teams-data').textContent).teams;
let D = ALL_TEAMS[0].data;
const $ = id => document.getElementById(id);

const pill = (text, style) => text
  ? `<span class="pill pill-${style||'grey'}">${text}</span>`
  : `<span class="pill pill-grey">\u2014</span>`;

const correctionCell = (val, fix, rec) => {
  const r = (rec && rec !== '\u2014' && rec !== '-') ? rec : null;
  if (fix) return `<div class="correction-wrap"><span class="correction-old">${val}</span><span class="correction-new">\u2192 ${fix}</span></div>`;
  if (r && !val) return `<span style="color:var(--orange);font-size:12px;font-weight:500;">${r} <em style="font-size:10px;font-weight:400;">(recommended)</em></span>`;
  return val || `<span class="pill pill-grey">\u2014</span>`;
};

function renderAll() {
  renderHeader();
  renderOverview();
  renderCases();
  renderThemes();
  renderActions();
  showTab('overview', document.querySelectorAll('.tab')[0]);
}

function switchTeam(teamId) {
  const team = ALL_TEAMS.find(t => t.id === teamId);
  if (!team) return;
  D = team.data;
  renderAll();
}

function renderHeader() {
  const teamSelect = ALL_TEAMS.map(t =>
    `<option value="${t.id}"${D === t.data ? ' selected' : ''}>${t.name}</option>`
  ).join('');
  $('hdr').innerHTML = `
  <div class="header-top">
    <div>
      <div style="font-size:11px;opacity:.65;font-weight:600;letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px;">Salesforce Support · OrgCS</div>
      <h1>Weekly Escalation Business Review</h1>
      <h2>Week of ${D.meta.weekLabel}</h2>
      <div class="badge-row">
        <span class="badge">${D.kpis.total} Escalations</span>
        <span class="badge">${D.meta.region || 'EMEA'}</span>
      </div>
      <div class="team-switcher">
        <span class="team-switcher-label">Team</span>
        <select class="team-select" id="teamSelect" onchange="switchTeam(this.value)">${teamSelect}</select>
      </div>
    </div>
    <div class="header-meta">
      <div><strong>${D.meta.preparedBy || 'Madhuri Vallabhaneni'}</strong></div>
      <div>${D.meta.title || 'Manager, Technical Support Engineering'}</div>
      <div style="margin-top:6px;">Prepared: ${D.meta.preparedDate}</div>
      <div>Data source: OrgCS Salesforce</div>
    </div>
  </div>`;
  $('ftr').innerHTML = `Week of ${D.meta.weekLabel} &nbsp;\u00b7&nbsp; Data source: OrgCS Salesforce &nbsp;\u00b7&nbsp; Generated ${D.meta.preparedDate}`;
}

function renderOverview() {
  if (D.kpis.total === 0) {
    $('section-overview').innerHTML = `
      <div class="zero-state">
        <div class="zero-state-icon">\u2705</div>
        <div class="zero-state-title">Zero Escalations This Week</div>
        <div class="zero-state-desc">No escalation Closed Loops were created for this team during the week of ${D.meta.weekLabel}. All engineers handled their cases without triggering an escalation.</div>
      </div>`;
    return;
  }
  const kpiDef = [
    { num: D.kpis.total,          label: 'Total Escalations This Week',          c: 'blue'   },
    { num: D.kpis.miscategorized, label: 'Mis-categorized CL (needs correction)', c: 'red'    },
    { num: D.kpis.clsCorrect,     label: 'CLs Fully & Correctly Filled',          c: 'red'    },
    { num: D.kpis.agentMiss,      label: 'Escalations Due to Agent Miss',         c: 'orange' },
    { num: D.kpis.productIssue,   label: 'Product / Platform Limitation',         c: 'yellow' },
    { num: D.kpis.openCases,      label: 'Cases Still Open',                      c: 'orange' },
    { num: D.kpis.coachingNeeded, label: 'Engineers Requiring Coaching',          c: 'red'    }
  ];
  const kpiHtml = `<div class="kpi-grid">${kpiDef.map(k=>`
    <div class="kpi-card ${k.c}"><div class="kpi-num ${k.c}">${k.num}</div><div class="kpi-label">${k.label}</div></div>`).join('')}</div>`;

  let donutOffset = 0;
  const donutSegs = (D.rootCauseChart||[]).map(s => {
    const seg = `<circle cx="21" cy="21" r="15.915" fill="transparent" stroke="${s.color}" stroke-width="5" stroke-dasharray="${s.pct} ${100-s.pct}" stroke-dashoffset="${-donutOffset}"/>`;
    donutOffset += s.pct;
    return seg;
  }).join('');
  const legendHtml = (D.rootCauseChart||[]).map(s =>
    `<div class="legend-item"><div class="legend-dot" style="background:${s.color}"></div>${s.label} (${s.count} \u2014 ${s.pct}%)</div>`
  ).join('');
  const donutHtml = `<div class="chart-card"><div class="chart-label">Root Cause Breakdown</div><div class="donut-row"><div class="donut-wrap"><svg class="donut-svg" width="110" height="110" viewBox="0 0 42 42"><circle cx="21" cy="21" r="15.915" fill="transparent" stroke="#e2e8f0" stroke-width="5"/>${donutSegs}</svg><div class="donut-center">${D.kpis.total}<small>cases</small></div></div><div class="donut-legend">${legendHtml}</div></div></div>`;

  const barsHtml = `<div class="chart-card"><div class="chart-label">Closed Loop Field Completeness</div><div class="bar-chart">${(D.clCompleteness||[]).map(c => {
    const display = c.status==='incorrect'?'Incorrect':c.status==='empty'?'0%':c.pct+'%';
    const width = Math.max(c.pct,4);
    return `<div class="bar-row"><div class="bar-label">${c.cl} ${c.account}</div><div class="bar-outer"><div class="bar-inner" style="width:${width}%;background:${c.color};">${display}</div></div><div class="bar-val" style="color:${c.color}">${c.status==='incorrect'?'\u2717':c.pct+'%'}</div></div>`;
  }).join('')}</div><div style="font-size:11px;color:var(--muted);margin-top:12px;">Target: 100% on all CLs within 48 hrs of escalation close</div></div>`;

  const summaryRows = (D.summaryTable||[]).map(r => `
    <tr ${r.rowHighlight?'style="background:#fff5f5;"':''}>
      <td><strong>${r.cl}</strong></td><td>${r.caseNum}</td>
      <td><strong>${r.account}</strong>${r.redAccount?`<br/><span class="pill pill-red" style="margin-top:4px;display:inline-block;">\uD83D\uDD34 RED Account</span>`:''}${r.accountNote?`<br/><span class="pill pill-${r.accountNoteStyle}" style="margin-top:4px;display:inline-block;">${r.accountNote}</span>`:''}</td>
      <td>${r.issue}</td><td>${r.owner}</td>
      <td>${correctionCell(r.rootCause,r.rootCauseCorrection,r.rootCauseRecommended)}</td>
      <td>${correctionCell(r.reasonCode,r.reasonCodeCorrection,r.reasonCodeRecommended)}</td>
      <td>${correctionCell(r.escStatus,r.escStatusCorrection,r.escStatusRecommended)}</td>
      <td>${pill(r.clStatus,r.clStatusStyle)}</td>
    </tr>`).join('');

  const incompleteCLs = (D.cases||[]).filter(c => c.clBadge && c.clBadge.text !== 'Complete');
  const agentMissCLs = incompleteCLs.filter(c => {
    const rc = (c.rootCause || c.rootCauseRecommended || '').toLowerCase();
    return rc.includes('customer updates') || rc.includes('case management');
  });
  const productCLs = incompleteCLs.filter(c => {
    const rc = (c.rootCause || c.rootCauseRecommended || '').toLowerCase();
    return rc.includes('product') || rc.includes('platform') || rc.includes('business impact');
  });
  const otherCLs = incompleteCLs.filter(c => !agentMissCLs.includes(c) && !productCLs.includes(c));

  function recRow(c) {
    const rc   = c.rootCause  || (c.rootCauseRecommended  ? `<span style="color:var(--orange);font-style:italic;">${c.rootCauseRecommended} (rec.)</span>` : '—');
    const code = c.reasonCode || (c.reasonCodeRecommended ? `<span style="color:var(--orange);font-style:italic;">${c.reasonCodeRecommended} (rec.)</span>` : '—');
    const esc  = c.escStatus  || (c.escStatusRecommended  ? `<span style="color:var(--orange);font-style:italic;">${c.escStatusRecommended} (rec.)</span>` : '—');
    return `<tr><td><strong>${c.cl}</strong></td><td>${c.account}</td><td>${c.owner}</td><td>${c.issue}</td><td>${rc}</td><td>${code}</td><td>${esc}</td><td>${pill(c.clBadge.text,c.clBadge.style)}</td></tr>`;
  }
  function recTable(cls, title, color) {
    if (!cls.length) return '';
    return `<div class="section-title" style="margin-top:24px;">${title}</div>
    <div class="table-wrap"><table><thead><tr style="background:${color}10;">
      <th>CL #</th><th>Account</th><th>Owner</th><th>Issue</th>
      <th>Root Cause</th><th>Reason Code</th><th>Esc. Status</th><th>CL Status</th>
    </tr></thead><tbody>${cls.map(recRow).join('')}</tbody></table></div>`;
  }
  const recHtml = incompleteCLs.length === 0 ? '' : `
    <div class="section-title" style="margin-top:28px;">Recommendations — Incomplete CLs</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:16px;">
      ${incompleteCLs.length} of ${D.kpis.total} CLs are incomplete. Recommended values shown in
      <span style="color:var(--orange);font-style:italic;">orange</span>. Complete all fields within 48 hours.
    </div>
    ${recTable(agentMissCLs, '⚠️ Escalations Due to Agent Miss',      '#e53e3e')}
    ${recTable(productCLs,   '🔧 Product / Platform Limitations',      '#dd6b20')}
    ${recTable(otherCLs,     '📋 Other Incomplete CLs — Review & Coach', '#718096')}
  `;

  $('section-overview').innerHTML = kpiHtml +
    `<div class="two-col">${donutHtml}${barsHtml}</div>
     <div class="section-title">Escalation Summary</div>
     <div class="table-wrap"><table><thead><tr>
       <th>CL #</th><th>Case #</th><th>Account</th><th>Issue</th><th>Owner</th>
       <th>Root Cause</th><th>Reason Code</th><th>Esc. Status</th><th>CL Status</th>
     </tr></thead><tbody>${summaryRows}</tbody></table></div>
     ${recHtml}`;
}

function renderCases() {
  if (!D.cases || D.cases.length === 0) {
    $('section-cases').innerHTML = `<div class="zero-state"><div class="zero-state-icon">\u2705</div><div class="zero-state-title">No Escalation Cases This Week</div><div class="zero-state-desc">No cases reached the escalation threshold for this team.</div></div>`;
    return;
  }
  const caseCards = D.cases.map(c => {
    const rcField = c.rootCauseCorrection
      ? `<div class="correction-wrap"><span class="correction-old">${c.rootCause}</span><span class="correction-new">\u2192 ${c.rootCauseCorrection}</span></div>`
      : c.rootCauseRecommended
        ? `<div class="case-field-value" style="color:var(--orange);font-size:12px;">${c.rootCauseRecommended} <em style="font-size:10px;">(recommended)</em></div>`
        : `<div class="case-field-value">${c.rootCause||'\u2014'}</div>`;
    const rcField2 = c.reasonCodeCorrection
      ? `<div class="correction-wrap"><span class="correction-old">${c.reasonCode}</span><span class="correction-new">\u2192 ${c.reasonCodeCorrection}</span></div>`
      : c.reasonCodeRecommended
        ? `<div class="case-field-value" style="color:var(--orange);font-size:12px;">${c.reasonCodeRecommended} <em style="font-size:10px;">(recommended)</em></div>`
        : `<div class="case-field-value">${c.reasonCode||'\u2014'}</div>`;
    const escField = c.escStatusCorrection
      ? `<div class="correction-wrap"><span class="correction-old">${c.escStatus}</span><span class="correction-new">\u2192 ${c.escStatusCorrection}</span></div>`
      : c.escStatusRecommended
        ? `<div class="case-field-value" style="color:var(--orange);font-size:12px;">${c.escStatusRecommended} <em style="font-size:10px;">(recommended)</em></div>`
        : `<div class="case-field-value">${c.escStatus||'\u2014'}</div>`;
    return `<div class="case-card${c.highlight?' highlight':''}">
      <div class="case-card-header sev-${c.severity}">
        <div>
          <div class="case-cl">${c.cl} \u00b7 Case ${c.caseNum}</div>
          <div class="case-account">${c.account}</div>
          <div style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap;">${c.badges.map(b=>pill(b.text,b.style)).join('')}</div>
        </div>
      </div>
      <div class="case-body">
        ${c.alertText?`<div style="background:#fff5f5;border:1px solid #fed7d7;border-radius:6px;padding:10px 12px;margin-bottom:12px;font-size:12px;color:var(--red);"><strong>Action Required:</strong> ${c.alertText}</div>`:''}
        <div class="case-field"><div class="case-field-label">Issue</div><div class="case-field-value">${c.issue}</div></div>
        <div class="case-divider"></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
          <div class="case-field"><div class="case-field-label">Owner</div><div class="case-field-value">${c.owner}</div></div>
          <div class="case-field"><div class="case-field-label">Escalated By</div><div class="case-field-value">${c.escalatedBy||'\u2014'}</div></div>
          ${c.instance?`<div class="case-field"><div class="case-field-label">Instance</div><div class="case-field-value">${c.instance}</div></div>`:''}
          <div class="case-field"><div class="case-field-label">Case Status</div><div class="case-field-value">${c.caseStatus}</div></div>
        </div>
        <div class="case-divider"></div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;">
          <div class="case-field"><div class="case-field-label">Root Cause</div>${rcField}</div>
          <div class="case-field"><div class="case-field-label">Reason Code</div>${rcField2}</div>
          <div class="case-field"><div class="case-field-label">Esc. Status</div>${escField}</div>
        </div>
      </div>
      <div class="expand-toggle" onclick="toggleExpand(this)">\u25BC Show Full Detail</div>
      <div class="case-expand">
        <p><strong>What happened:</strong> ${c.narrative||''}</p>
        ${c.customerQuote?`<blockquote>${c.customerQuote}</blockquote>`:''}
        <p><strong>Current state:</strong> ${c.outcome||''}</p>
        <div class="case-field-label" style="margin-top:10px;">Required CL Actions</div>
        <ul class="case-action-list">${(c.requiredActions||[]).map(a=>`<li>${a}</li>`).join('')}</ul>
      </div>
    </div>`;
  }).join('');
  $('section-cases').innerHTML = `<div class="notice"><span style="font-size:16px;flex-shrink:0;">\u2139</span><span>Click <strong>Show Full Detail</strong> on any card to expand the full narrative.</span></div><div class="case-grid">${caseCards}</div>`;
}

function renderThemes() {
  const themeCards = (D.themes||[]).map(t => `
    <div class="theme-card ${t.color}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;">
        <div class="theme-title">${t.title}</div>${pill(t.priority,t.color)}
      </div>
      <div class="theme-affected">${t.affected}</div>
      <div class="theme-desc">${t.desc}</div>
      <div class="theme-action"><strong>Action:</strong> ${t.action}</div>
    </div>`).join('');

  const scorecardRows = (D.scorecard||[]).map(r => `
    <tr>
      <td><strong>${r.cl}</strong><br/><span style="font-size:11px;color:var(--muted);">${r.account}</span></td>
      <td>${pill(r.escStatus.text,r.escStatus.style)}</td>
      <td>${pill(r.rootCause.text,r.rootCause.style)}</td>
      <td>${pill(r.reasonCode.text,r.reasonCode.style)}</td>
      <td>${pill(r.summary.text,r.summary.style)}</td>
      <td>${pill(r.detail.text,r.detail.style)}</td>
      <td>${pill(r.coaching.text,r.coaching.style)}</td>
      <td><strong style="color:${r.scoreColor}">${r.score}</strong></td>
    </tr>`).join('');

  const scorecardSection = D.scorecard && D.scorecard.length > 0
    ? `<div class="section-title">CL Completeness Scorecard</div><div class="table-wrap"><table><thead><tr><th>CL</th><th>Esc. Status</th><th>Root Cause</th><th>Reason Code</th><th>Summary</th><th>Detail</th><th>Coaching Opportunity</th><th>Score</th></tr></thead><tbody>${scorecardRows}</tbody></table></div>`
    : `<div class="zero-state" style="padding:20px;"><div style="font-size:24px;margin-bottom:8px;">\u2705</div><div style="font-size:14px;font-weight:700;color:var(--green);">No CLs to score this week</div></div>`;

  $('section-themes').innerHTML = `<div class="section-title">Key Themes This Week</div><div class="theme-grid">${themeCards}</div>${scorecardSection}`;
}

function renderActions() {
  const actionRows = (D.actions||[]).map(a => `
    <tr>
      <td><span class="priority-dot dot-${a.priorityColor}"></span><strong>${a.priority}</strong></td>
      <td>${a.action}</td><td>${a.owner}</td><td>${a.due}</td>
    </tr>`).join('');

  const coachingCards = (D.coaching||[]).map(c => `
    <div class="coaching-card">
      <div style="font-size:13px;font-weight:700;">${c.name}</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:10px;">${c.caseRef}</div>
      ${pill(c.tag,c.tagStyle)}
      <div style="font-size:12px;color:var(--text);line-height:1.6;margin-top:10px;">${c.note}</div>
    </div>`).join('');

  const coachingSection = D.coaching && D.coaching.length > 0
    ? `<div class="section-title">Coaching Summary</div><div class="coaching-grid">${coachingCards}</div>`
    : `<div class="section-title">Coaching Summary</div><div class="zero-state" style="padding:20px;"><div style="font-size:24px;margin-bottom:8px;">\u2705</div><div style="font-size:14px;font-weight:700;color:var(--green);">No coaching actions this week</div></div>`;

  $('section-actions').innerHTML = `<div class="section-title">Action Items \u2014 Week of ${D.meta.preparedDate}</div><div class="table-wrap" style="margin-bottom:28px;"><table><thead><tr><th>Priority</th><th>Action</th><th>Owner</th><th>Due</th></tr></thead><tbody>${actionRows}</tbody></table></div>${coachingSection}`;
}


function showTab(name, el) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('section-' + name).classList.add('active');
  if (el) { el.classList.add('active'); }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleExpand(btn) {
  const expand = btn.previousElementSibling;
  const isOpen = expand.classList.contains('open');
  expand.classList.toggle('open');
  btn.textContent = isOpen ? '\u25BC Show Full Detail' : '\u25B2 Hide Detail';
}

// Init
renderAll();
</script>
</body>
</html>
