<style>
  :root {
    --bg:#f0f2f5; --card:#fff; --border:#e2e8f0; --text:#1a202c; --muted:#718096;
    --red:#e53e3e; --red-light:#fff5f5;
    --orange:#dd6b20; --orange-light:#fffaf0;
    --yellow:#d69e2e; --yellow-light:#fffff0;
    --green:#38a169; --green-light:#f0fff4;
    --blue:#3182ce; --blue-light:#ebf8ff;
    --sf-blue:#0070d2;
    --radius:10px; --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.06);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;}
  .header{background:linear-gradient(135deg,#0070d2 0%,#032d60 100%);color:#fff;padding:28px 40px 24px;}
  .header-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;}
  .header h1{font-size:22px;font-weight:700;letter-spacing:-.3px;}
  .header h2{font-size:14px;font-weight:400;opacity:.8;margin-top:4px;}
  .header-meta{text-align:right;font-size:12px;opacity:.75;line-height:1.8;}
  .badge-row{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
  .badge{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:500;}
  .tabs{background:#fff;border-bottom:1px solid var(--border);padding:0 40px;display:flex;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.06);overflow-x:auto;}
  .tab{padding:14px 20px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;}
  .tab:hover{color:var(--sf-blue);}
  .tab.active{color:var(--sf-blue);border-bottom-color:var(--sf-blue);}
  .content{padding:28px 40px;max-width:1400px;margin:0 auto;}
  .section{display:none;} .section.active{display:block;}
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:14px;margin-bottom:28px;}
  .kpi-card{background:var(--card);border-radius:var(--radius);padding:18px 16px;box-shadow:var(--shadow);border-top:3px solid var(--border);text-align:center;}
  .kpi-card.red{border-top-color:var(--red);} .kpi-card.orange{border-top-color:var(--orange);}
  .kpi-card.green{border-top-color:var(--green);} .kpi-card.blue{border-top-color:var(--blue);}
  .kpi-card.yellow{border-top-color:var(--yellow);}
  .kpi-num{font-size:32px;font-weight:700;line-height:1;}
  .kpi-num.red{color:var(--red);} .kpi-num.orange{color:var(--orange);} .kpi-num.green{color:var(--green);} .kpi-num.blue{color:var(--blue);} .kpi-num.yellow{color:var(--yellow);}
  .kpi-label{font-size:11px;color:var(--muted);margin-top:6px;line-height:1.3;}
  .section-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
  .section-title::after{content:'';flex:1;height:1px;background:var(--border);}
  .table-wrap{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:auto;margin-bottom:28px;}
  table{width:100%;border-collapse:collapse;min-width:600px;}
  thead{background:#f7fafc;}
  th{padding:11px 14px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap;}
  td{padding:12px 14px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:top;}
  tr:last-child td{border-bottom:none;} tr:hover td{background:#fafbfc;}
  .pill{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;}
  .pill-red{background:var(--red-light);color:var(--red);}
  .pill-orange{background:var(--orange-light);color:var(--orange);}
  .pill-yellow{background:var(--yellow-light);color:var(--yellow);}
  .pill-green{background:var(--green-light);color:var(--green);}
  .pill-blue{background:var(--blue-light);color:var(--blue);}
  .pill-grey{background:#f7fafc;color:var(--muted);border:1px solid var(--border);}
  .case-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:18px;margin-bottom:28px;}
  .case-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
  .case-card.highlight{border:2px solid var(--red);}
  .case-card-header{padding:14px 18px 12px;border-left:4px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
  .sev-red{border-left-color:var(--red)!important;background:var(--red-light)!important;}
  .sev-orange{border-left-color:var(--orange)!important;background:var(--orange-light)!important;}
  .sev-yellow{border-left-color:var(--yellow)!important;background:var(--yellow-light)!important;}
  .case-cl{font-size:11px;font-weight:700;color:var(--muted);}
  .case-account{font-size:14px;font-weight:700;margin-top:2px;}
  .case-body{padding:14px 18px;}
  .case-field{margin-bottom:8px;}
  .case-field-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:2px;}
  .case-field-value{font-size:13px;color:var(--text);}
  .case-divider{height:1px;background:var(--border);margin:10px 0;}
  .case-expand{display:none;padding:0 18px 14px;}
  .case-expand.open{display:block;}
  .case-expand p{font-size:13px;color:var(--text);margin-bottom:8px;line-height:1.6;}
  .case-expand blockquote{border-left:3px solid var(--border);padding:6px 12px;margin:8px 0;color:var(--muted);font-style:italic;font-size:12px;background:#f9f9f9;border-radius:0 4px 4px 0;}
  .case-action-list{list-style:none;padding:0;margin-top:8px;}
  .case-action-list li{padding:5px 0 5px 18px;position:relative;font-size:12px;color:var(--text);}
  .case-action-list li::before{content:'→';position:absolute;left:0;color:var(--sf-blue);font-weight:700;}
  .expand-toggle{display:block;text-align:center;padding:8px;font-size:11px;font-weight:600;color:var(--sf-blue);border-top:1px solid var(--border);cursor:pointer;user-select:none;background:#fafbff;}
  .expand-toggle:hover{background:var(--blue-light);}
  .correction-wrap{display:flex;flex-direction:column;gap:2px;}
  .correction-old{text-decoration:line-through;color:var(--muted);font-size:11px;}
  .correction-new{color:var(--red);font-weight:600;font-size:12px;}
  .theme-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-bottom:28px;}
  .theme-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;border-left:4px solid var(--border);}
  .theme-card.red{border-left-color:var(--red);} .theme-card.orange{border-left-color:var(--orange);} .theme-card.yellow{border-left-color:var(--yellow);}
  .theme-title{font-size:13px;font-weight:700;margin-bottom:4px;}
  .theme-affected{font-size:11px;color:var(--muted);margin-bottom:10px;}
  .theme-desc{font-size:13px;color:var(--text);line-height:1.6;margin-bottom:10px;}
  .theme-action{background:#f7fafc;border-radius:6px;padding:10px 12px;font-size:12px;color:var(--text);border-left:3px solid var(--sf-blue);line-height:1.5;}
  .wins-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-bottom:28px;}
  .win-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;border-left:4px solid var(--green);}
  .win-engineer{font-size:13px;font-weight:700;margin-bottom:2px;}
  .win-case{font-size:11px;color:var(--muted);margin-bottom:10px;}
  .win-desc{font-size:13px;line-height:1.6;color:var(--text);}
  .priority-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle;}
  .dot-red{background:var(--red);} .dot-orange{background:var(--orange);} .dot-yellow{background:var(--yellow);}
  .notice{background:#fffbeb;border:1px solid #f6e05e;border-radius:8px;padding:12px 16px;font-size:13px;margin-bottom:20px;display:flex;align-items:flex-start;gap:10px;}
  .two-col{display:grid;grid-template-columns:auto 1fr;gap:24px;align-items:start;margin-bottom:28px;}
  .chart-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;}
  .chart-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px;}
  .donut-row{display:flex;align-items:center;gap:20px;}
  .donut-wrap{position:relative;width:110px;height:110px;flex-shrink:0;}
  .donut-svg{transform:rotate(-90deg);}
  .donut-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;font-size:20px;font-weight:700;color:var(--text);line-height:1;}
  .donut-center small{display:block;font-size:10px;font-weight:400;color:var(--muted);}
  .donut-legend{display:flex;flex-direction:column;gap:8px;}
  .legend-item{display:flex;align-items:center;gap:8px;font-size:12px;}
  .legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .bar-chart{display:flex;flex-direction:column;gap:10px;}
  .bar-row{display:flex;align-items:center;gap:10px;}
  .bar-label{width:170px;font-size:11px;color:var(--text);flex-shrink:0;text-align:right;}
  .bar-outer{flex:1;background:var(--border);border-radius:4px;overflow:hidden;height:22px;}
  .bar-inner{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:8px;font-size:11px;font-weight:600;color:#fff;min-width:30px;}
  .bar-val{font-size:11px;font-weight:700;width:36px;color:var(--text);}
  .coaching-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-bottom:28px;}
  .coaching-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;}
  .footer{text-align:center;padding:20px 40px;font-size:11px;color:var(--muted);border-top:1px solid var(--border);background:#fff;margin-top:16px;}
  @media(max-width:800px){.two-col{grid-template-columns:1fr;}}
  @media(max-width:700px){.content{padding:16px 14px;}.header{padding:20px 14px;}.tabs{padding:0 4px;}.tab{padding:12px 10px;font-size:12px;}.case-grid{grid-template-columns:1fr;}.kpi-grid{grid-template-columns:repeat(2,1fr);}}
</style>
</head>
<body>

<div class="header" id="hdr"></div>

<div class="tabs">
  <div class="tab active"  onclick="showTab('overview',this)">Overview</div>
  <div class="tab"         onclick="showTab('cases',this)">Case Details</div>
  <div class="tab"         onclick="showTab('themes',this)">Themes &amp; Insights</div>
  <div class="tab"         onclick="showTab('actions',this)">Action Items</div>
  <div class="tab"         onclick="showTab('wins',this)">Wins</div>
</div>

<div class="content">
  <div class="section active" id="section-overview"></div>
  <div class="section"        id="section-cases"></div>
  <div class="section"        id="section-themes"></div>
  <div class="section"        id="section-actions"></div>
  <div class="section"        id="section-wins"></div>
</div>

<div class="footer" id="ftr"></div>

<script>
// ─── helpers ───────────────────────────────────────────────────────────────
const D = JSON.parse(document.getElementById('weekly-data').textContent);
const $ = id => document.getElementById(id);
const pill = (text, style) => text
  ? `<span class="pill pill-${style||'grey'}">${text}</span>`
  : `<span class="pill pill-grey">—</span>`;
const correctionCell = (val, fix) => fix
  ? `<div class="correction-wrap"><span class="correction-old">${val}</span><span class="correction-new">→ ${fix}</span></div>`
  : (val || `<span class="pill pill-grey">—</span>`);

// ─── HEADER ────────────────────────────────────────────────────────────────
$('hdr').innerHTML = `
<div class="header-top">
  <div>
    <div style="font-size:11px;opacity:.65;font-weight:600;letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px;">Salesforce Support · OrgCS</div>
    <h1>Weekly Escalation Business Review</h1>
    <h2>Week of ${D.meta.weekLabel}</h2>
    <div class="badge-row">
      <span class="badge">${D.kpis.total} Escalations</span>
      <span class="badge">${D.meta.region}</span>
    </div>
  </div>
  <div class="header-meta">
    <div><strong>${D.meta.preparedBy}</strong></div>
    <div>${D.meta.title}</div>
    <div style="margin-top:6px;">Prepared: ${D.meta.preparedDate}</div>
    <div>Data source: OrgCS Salesforce</div>
  </div>
</div>`;

// ─── FOOTER ────────────────────────────────────────────────────────────────
$('ftr').innerHTML = `Week of ${D.meta.weekLabel} &nbsp;·&nbsp; Data source: OrgCS Salesforce &nbsp;·&nbsp; Prepared by ${D.meta.preparedBy} &nbsp;·&nbsp; Generated ${D.meta.preparedDate}`;

// ─── OVERVIEW ──────────────────────────────────────────────────────────────
const kpiDef = [
  { num: D.kpis.total,          label: 'Total Escalations This Week',          c: 'blue'   },
  { num: D.kpis.qualified,      label: 'Qualified Escalations',                 c: 'green'  },
  { num: D.kpis.miscategorized, label: 'Mis-categorized CL (needs correction)', c: 'red'    },
  { num: D.kpis.clsCorrect,     label: 'CLs Fully & Correctly Filled',          c: 'red'    },
  { num: D.kpis.agentMiss,      label: 'Escalations Due to Agent Miss',         c: 'orange' },
  { num: D.kpis.productIssue,   label: 'Product / Platform Limitation',         c: 'yellow' },
  { num: D.kpis.openCases,      label: 'Cases Still Open',                      c: 'orange' },
  { num: D.kpis.coachingNeeded, label: 'Engineers Requiring Coaching',          c: 'red'    }
];
const kpiHtml = `<div class="kpi-grid">${kpiDef.map(k=>`
  <div class="kpi-card ${k.c}">
    <div class="kpi-num ${k.c}">${k.num}</div>
    <div class="kpi-label">${k.label}</div>
  </div>`).join('')}</div>`;

// Donut
let donutOffset = 0;
const donutSegs = D.rootCauseChart.map(s => {
  const seg = `<circle cx="21" cy="21" r="15.915" fill="transparent" stroke="${s.color}" stroke-width="5"
    stroke-dasharray="${s.pct} ${100-s.pct}" stroke-dashoffset="${-donutOffset}"/>`;
  donutOffset += s.pct;
  return seg;
}).join('');
const legendHtml = D.rootCauseChart.map(s =>
  `<div class="legend-item"><div class="legend-dot" style="background:${s.color}"></div>${s.label} (${s.count} — ${s.pct}%)</div>`
).join('');
const donutHtml = `
<div class="chart-card">
  <div class="chart-label">Root Cause Breakdown</div>
  <div class="donut-row">
    <div class="donut-wrap">
      <svg class="donut-svg" width="110" height="110" viewBox="0 0 42 42">
        <circle cx="21" cy="21" r="15.915" fill="transparent" stroke="#e2e8f0" stroke-width="5"/>
        ${donutSegs}
      </svg>
      <div class="donut-center">${D.kpis.total}<small>cases</small></div>
    </div>
    <div class="donut-legend">${legendHtml}</div>
  </div>
</div>`;

// Completeness bar chart
const barsHtml = `
<div class="chart-card">
  <div class="chart-label">Closed Loop Field Completeness</div>
  <div class="bar-chart">
    ${D.clCompleteness.map(c => {
      const display = c.status === 'incorrect' ? 'Incorrect' : c.status === 'empty' ? '0%' : c.pct + '%';
      const width = Math.max(c.pct, 4);
      return `<div class="bar-row">
        <div class="bar-label">${c.cl} ${c.account}</div>
        <div class="bar-outer"><div class="bar-inner" style="width:${width}%;background:${c.color};">${display}</div></div>
        <div class="bar-val" style="color:${c.color}">${c.status === 'incorrect' ? '✗' : c.pct + '%'}</div>
      </div>`;
    }).join('')}
  </div>
  <div style="font-size:11px;color:var(--muted);margin-top:12px;">Target: 100% on all CLs within 48 hrs of escalation close</div>
</div>`;

// Summary table
const summaryRows = D.summaryTable.map(r => `
  <tr ${r.rowHighlight ? 'style="background:#fff5f5;"' : ''}>
    <td><strong>${r.cl}</strong></td>
    <td>${r.caseNum}</td>
    <td><strong>${r.account}</strong>${r.accountNote ? `<br/><span class="pill pill-${r.accountNoteStyle}" style="margin-top:4px;display:inline-block;">${r.accountNote}</span>` : ''}</td>
    <td>${r.issue}</td>
    <td>${r.owner}</td>
    <td>${correctionCell(r.rootCause, r.rootCauseCorrection)}</td>
    <td>${correctionCell(r.reasonCode, r.reasonCodeCorrection)}</td>
    <td>${correctionCell(r.escStatus, r.escStatusCorrection)}</td>
    <td>${pill(r.clStatus, r.clStatusStyle)}</td>
  </tr>`).join('');

$('section-overview').innerHTML = kpiHtml +
  `<div class="two-col">${donutHtml}${barsHtml}</div>
   <div class="section-title">Escalation Summary</div>
   <div class="table-wrap"><table>
     <thead><tr>
       <th>CL #</th><th>Case #</th><th>Account</th><th>Issue</th><th>Owner</th>
       <th>Root Cause</th><th>Reason Code</th><th>Esc. Status</th><th>CL Status</th>
     </tr></thead>
     <tbody>${summaryRows}</tbody>
   </table></div>`;

// ─── CASES ─────────────────────────────────────────────────────────────────
const caseCards = D.cases.map((c, i) => {
  const rcField = c.rootCauseCorrection
    ? `<div class="correction-wrap"><span class="correction-old">${c.rootCause}</span><span class="correction-new">→ ${c.rootCauseCorrection}</span></div>`
    : c.rootCauseRecommended
      ? `<div class="case-field-value" style="color:var(--orange);font-size:12px;">${c.rootCauseRecommended} <em style="font-size:10px;">(recommended)</em></div>`
      : `<div class="case-field-value">${c.rootCause || '—'}</div>`;
  const rcField2 = c.reasonCodeCorrection
    ? `<div class="correction-wrap"><span class="correction-old">${c.reasonCode}</span><span class="correction-new">→ ${c.reasonCodeCorrection}</span></div>`
    : c.reasonCodeRecommended
      ? `<div class="case-field-value" style="color:var(--orange);font-size:12px;">${c.reasonCodeRecommended} <em style="font-size:10px;">(recommended)</em></div>`
      : `<div class="case-field-value">${c.reasonCode || '—'}</div>`;
  const escField = c.escStatusCorrection
    ? `<div class="correction-wrap"><span class="correction-old">${c.escStatus}</span><span class="correction-new">→ ${c.escStatusCorrection}</span></div>`
    : c.escStatusRecommended
      ? `<div class="case-field-value" style="color:var(--orange);font-size:12px;">${c.escStatusRecommended} <em style="font-size:10px;">(recommended)</em></div>`
      : `<div class="case-field-value">${c.escStatus || '—'}</div>`;

  return `
  <div class="case-card${c.highlight ? ' highlight' : ''}">
    <div class="case-card-header sev-${c.severity}">
      <div>
        <div class="case-cl">${c.cl} · Case ${c.caseNum}</div>
        <div class="case-account">${c.account}</div>
        <div style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap;">
          ${c.badges.map(b => pill(b.text, b.style)).join('')}
        </div>
      </div>
    </div>
    <div class="case-body">
      ${c.alertText ? `<div style="background:#fff5f5;border:1px solid #fed7d7;border-radius:6px;padding:10px 12px;margin-bottom:12px;font-size:12px;color:var(--red);"><strong>Action Required:</strong> ${c.alertText}</div>` : ''}
      <div class="case-field">
        <div class="case-field-label">Issue</div>
        <div class="case-field-value">${c.issue}</div>
      </div>
      <div class="case-divider"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        <div class="case-field"><div class="case-field-label">Owner</div><div class="case-field-value">${c.owner}</div></div>
        <div class="case-field"><div class="case-field-label">Escalated By</div><div class="case-field-value">${c.escalatedBy}</div></div>
        ${c.instance ? `<div class="case-field"><div class="case-field-label">Instance</div><div class="case-field-value">${c.instance}</div></div>` : ''}
        <div class="case-field"><div class="case-field-label">Case Status</div><div class="case-field-value">${c.caseStatus}</div></div>
      </div>
      <div class="case-divider"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;">
        <div class="case-field"><div class="case-field-label">Root Cause</div>${rcField}</div>
        <div class="case-field"><div class="case-field-label">Reason Code</div>${rcField2}</div>
        <div class="case-field"><div class="case-field-label">Esc. Status</div>${escField}</div>
      </div>
    </div>
    <div class="expand-toggle" onclick="toggleExpand(this)">▼ Show Full Detail</div>
    <div class="case-expand">
      <p><strong>What happened:</strong> ${c.narrative}</p>
      ${c.customerQuote ? `<blockquote>${c.customerQuote}</blockquote>` : ''}
      <p><strong>Current state:</strong> ${c.outcome}</p>
      <div class="case-field-label" style="margin-top:10px;">Required CL Actions</div>
      <ul class="case-action-list">
        ${c.requiredActions.map(a => `<li>${a}</li>`).join('')}
      </ul>
    </div>
  </div>`;
}).join('');

$('section-cases').innerHTML = `
  <div class="notice"><span style="font-size:16px;flex-shrink:0;">ℹ</span>
  <span>Click <strong>Show Full Detail</strong> on any card to expand the complete case narrative, customer quotes, and required CL corrections.</span></div>
  <div class="case-grid">${caseCards}</div>`;

// ─── THEMES ────────────────────────────────────────────────────────────────
const themeCards = D.themes.map(t => `
  <div class="theme-card ${t.color}">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;">
      <div class="theme-title">${t.title}</div>
      ${pill(t.priority, t.color)}
    </div>
    <div class="theme-affected">${t.affected}</div>
    <div class="theme-desc">${t.desc}</div>
    <div class="theme-action"><strong>Action:</strong> ${t.action}</div>
  </div>`).join('');

const scorecardRows = D.scorecard.map(r => `
  <tr>
    <td><strong>${r.cl}</strong><br/><span style="font-size:11px;color:var(--muted);">${r.account}</span></td>
    <td>${pill(r.escStatus.text, r.escStatus.style)}</td>
    <td>${pill(r.rootCause.text, r.rootCause.style)}</td>
    <td>${pill(r.reasonCode.text, r.reasonCode.style)}</td>
    <td>${pill(r.summary.text, r.summary.style)}</td>
    <td>${pill(r.detail.text, r.detail.style)}</td>
    <td>${pill(r.coaching.text, r.coaching.style)}</td>
    <td><strong style="color:${r.scoreColor}">${r.score}</strong></td>
  </tr>`).join('');

$('section-themes').innerHTML = `
  <div class="section-title">Key Themes This Week</div>
  <div class="theme-grid">${themeCards}</div>
  <div class="section-title">CL Completeness Scorecard</div>
  <div class="table-wrap"><table>
    <thead><tr>
      <th>CL</th><th>Esc. Status</th><th>Root Cause</th><th>Reason Code</th>
      <th>Summary</th><th>Detail</th><th>Coaching Opportunity</th><th>Score</th>
    </tr></thead>
    <tbody>${scorecardRows}</tbody>
  </table></div>`;

// ─── ACTIONS ───────────────────────────────────────────────────────────────
const actionRows = D.actions.map(a => `
  <tr>
    <td><span class="priority-dot dot-${a.priorityColor}"></span><strong>${a.priority}</strong></td>
    <td>${a.action}</td>
    <td>${a.owner}</td>
    <td>${a.due}</td>
  </tr>`).join('');

const coachingCards = D.coaching.map(c => `
  <div class="coaching-card">
    <div style="font-size:13px;font-weight:700;">${c.name}</div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:10px;">${c.caseRef}</div>
    ${pill(c.tag, c.tagStyle)}
    <div style="font-size:12px;color:var(--text);line-height:1.6;margin-top:10px;">${c.note}</div>
  </div>`).join('');

$('section-actions').innerHTML = `
  <div class="section-title">Action Items — Week of ${D.meta.preparedDate}</div>
  <div class="table-wrap" style="margin-bottom:28px;"><table>
    <thead><tr><th>Priority</th><th>Action</th><th>Owner</th><th>Due</th></tr></thead>
    <tbody>${actionRows}</tbody>
  </table></div>
  <div class="section-title">Coaching Summary</div>
  <div class="coaching-grid">${coachingCards}</div>`;

// ─── WINS ──────────────────────────────────────────────────────────────────
const winCards = D.wins.map(w => `
  <div class="win-card">
    <div class="win-engineer">${w.engineer}</div>
    <div class="win-case">${w.caseRef}</div>
    <div class="win-desc">${w.desc}</div>
  </div>`).join('');

const strengthCards = D.teamStrengths.map(s => `
  <div style="padding:14px;background:#f0fff4;border-radius:8px;border:1px solid #c6f6d5;">
    <div style="font-size:12px;font-weight:700;color:var(--green);margin-bottom:6px;">${s.title}</div>
    <div style="font-size:12px;color:var(--text);line-height:1.5;">${s.desc}</div>
  </div>`).join('');

$('section-wins').innerHTML = `
  <div class="section-title">Wins This Week</div>
  <div class="wins-grid">${winCards}</div>
  <div style="background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:28px;">
    <div style="font-size:13px;font-weight:700;margin-bottom:14px;">Team Strengths to Build On</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px;">${strengthCards}</div>
  </div>`;

// ─── TAB SWITCHING ─────────────────────────────────────────────────────────
function showTab(name, el) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('section-' + name).classList.add('active');
  el.classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function toggleExpand(btn) {
  const expand = btn.previousElementSibling;
  const isOpen = expand.classList.contains('open');
  expand.classList.toggle('open');
  btn.textContent = isOpen ? '▼ Show Full Detail' : '▲ Hide Detail';
}
</script>
</body>
</html>
